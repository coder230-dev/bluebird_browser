<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://freesvg.org/img/1430954247.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" />
    <title>Bluebird — Futuristic Browser</title>
</head>

<body>
    <div id="suggestions" class="suggestions"></div>

    <div class="bg">
        <div class="aurora a1"></div>
        <div class="aurora a2"></div>
        <div class="aurora a3"></div>
        <div class="grid"></div>
    </div>

    <div id="notification"></div>

    <header class="head">
        <div class="actions">
            <button id="command-btn" title="Command Palette (⌘K)">
                <span class="material-symbols-rounded">keyboard_command_key</span>
            </button>
            <button id="profile-btn" title="Profile">
                <span class="material-symbols-rounded">account_circle</span>
            </button>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <div class="logo">
                <div class="logo-ring">
                    <img src="https://freesvg.org/img/1430954247.png" alt="Bluebird">
                </div>
            </div>
            <div class="greeting">
                <h1 id="greeting-text">Good afternoon</h1>
                <p id="time-text">—</p>
            </div>
        </div>
        <main class="display1" style="z-index: 5;">
            <div class="omnibox-wrap" id="s-i">
                <div class="search-input" id="search-container">
                    <div class="search-leading">
                        <span class="material-symbols-rounded">search</span>
                        <select id="search-type" disabled>
                            <option>Search</option>
                        </select>
                    </div>
                    <textarea id="search-suggestion" placeholder="Search, ask AI, or enter URL" rows="1"></textarea>
                    <div class="search-trailing">
                        <button id="voice-btn" title="Voice">
                            <span class="material-symbols-rounded">mic</span>
                        </button>
                        <button id="send" class="send-btn" title="Search">
                            <span class="material-symbols-rounded">north</span>
                        </button>
                    </div>
                </div>
            </div>
            <div id="bluebird-browser-actions" class="quick-actions">
                <button data-action="ai">
                    <span class="material-symbols-rounded">auto_awesome</span>
                    <span>Ask AI</span>
                </button>
                <button data-action="history">
                    <span class="material-symbols-rounded">history</span>
                    <span>History</span>
                </button>
                <button data-action="bookmarks">
                    <span class="material-symbols-rounded">bookmarks</span>
                    <span>Bookmarks</span>
                </button>
                <button data-action="apps">
                    <span class="material-symbols-rounded">apps</span>
                    <span>Apps</span>
                </button>
            </div>
        </main>

        <footer class="display2">
            <div class="panels">
                <section class="panel glass">
                    <div class="panel-head">
                        <h4><span class="material-symbols-rounded">history</span> Recents</h4>
                        <button id="see-all-history" class="see-all">
                            <span>Manage</span>
                            <span class="material-symbols-rounded">north_east</span>
                        </button>
                    </div>
                    <div id="all-history" class="panel-list"></div>
                </section>
                <section class="panel glass">
                    <div class="panel-head">
                        <h4><span class="material-symbols-rounded">bookmark</span> Pinned</h4>
                        <button id="see-all-bookmarks" class="see-all">
                            <span>Manage</span>
                            <span class="material-symbols-rounded">north_east</span>
                        </button>
                    </div>
                    <div id="all-bookmarks" class="panel-list"></div>
                </section>
            </div>
        </footer>
    </div>

    <!-- Command Palette -->
    <div id="command-palette" class="command-palette" hidden>
        <div class="cmd-backdrop"></div>
        <div class="cmd-modal glass">
            <div class="cmd-input-wrap">
                <span class="material-symbols-rounded">search</span>
                <input id="cmd-input" placeholder="Type a command..." />
                <kbd>ESC</kbd>
            </div>
            <div class="cmd-list">
                <div class="cmd-item" data-cmd="newtab"><span class="material-symbols-rounded">add</span> New Tab</div>
                <div class="cmd-item" data-cmd="ai"><span class="material-symbols-rounded">auto_awesome</span> Search
                    with AI (!ai)</div>
                <div class="cmd-item" data-cmd="history"><span class="material-symbols-rounded">history</span> Open
                    History</div>
                <div class="cmd-item" data-cmd="bookmarks"><span class="material-symbols-rounded">bookmarks</span> Open
                    Bookmarks</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
