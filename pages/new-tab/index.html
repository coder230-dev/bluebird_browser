<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://freesvg.org/img/1430954247.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Bluebird Search</title>
</head>

<body>
    <div id="notification"></div>
    <div class="container">
        <nav class="nav">
            <h3>Bluebird Search</h3>
            <span>
                <!-- <button id="settings-btn">
                    <a href="../settings/index.html">
                        <i class="material-symbols-rounded" title="Settings">
                            settings
                        </i>
                    </a>
                </button> -->
                <!-- <button>
                    <i class="material-symbols-rounded" title="Account">
                        account_circle
                    </i>
                </button> -->
            </span>
        </nav>
        <div class="logo">
            <div>
                <img src="../profilePages/images/Copilot_20251122_223052.png" alt="">
            </div>
        </div>
        <main class="display1">
            <div class="search-input" id="s-i">
                <select id="search-type" disabled>
                    <option value="regular">Regular Search</option>
                </select>
                <textarea type="search" id="search-suggestion"
                    placeholder="Search The Internet, URLS, and with AI"></textarea>
                <button id="send">
                    <span class="material-symbols-rounded">
                        arrow_circle_up
                    </span>
                </button>
                <div id="suggestions" class="suggestions"></div>
            </div>
            <div id="bluebird-browser-actions">
                <button style="position: relative;">
                    <i class="material-symbols-rounded">
                        bookmarks
                    </i>
                </button>
                <button style="position: relative;">
                    <i class="material-symbols-rounded">
                        history
                    </i>
                </button>
            </div>
        </main>
        <footer class="display2" style="margin-top: 40px;">
            <div class="card">
                <h4>History</h4>
                <div id="all-history"></div>
                <button id="see-all-history" class="see-all"><i class="material-symbols-rounded">manage_history</i> See
                    All History</button>
            </div>
            <div class="card">
                <h4>Bookmarks</h4>
                <div id="all-bookmarks"></div>
                <button id="see-all-bookmarks" class="see-all"><i class="material-symbols-rounded">bookmark_manager</i>
                    See All Bookmarks</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
