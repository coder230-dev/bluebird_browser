<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.85">
    <title>Bluebird Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <nav id="main-nav">
        <img src="../../images/Copilot_20251122_223052.png" alt="Bluebird Browser Logo">
        <span class="title-text">Profile Manager</span>
    </nav>
    <main id="makeSurePage">
        <div class="profiles-container">
            <div class="profiles-header">
                <div>
                    <h1>Select Profile</h1>
                    <p>Choose a profile to use Bluebird Browser.</p>
                </div>
                <input type="search" id="searchProfiles" class="search-input" placeholder="Search profiles...">
            </div>
            
            <div id="profiles" class="profiles-grid"></div>
            
            <div id="noResults" class="no-results-message" style="display: none;">
                <span class="material-symbols-rounded" style="font-size: 64px; opacity: 0.5;">search_off</span>
                <p>No profiles found</p>
            </div>
            
            <div class="profiles-actions">
                <button onclick="window.electronAPI.openAppPage('pages/profilePages/addProfile.html', 550, 750, undefined)" class="btn btn-primary">
                    <span class="material-symbols-rounded">add</span>
                    New Profile
                </button>
                <button onclick="window.electronAPI.quitApp()" class="btn btn-secondary">
                    <span class="material-symbols-rounded">logout</span>
                    Quit
                </button>
            </div>
        </div>
        <footer><h6>Bluebird Browser for macOS</h6></footer>
    </main>
	<script src="script.js"></script>
	<script src="renderer.js" type="module"></script>
    <script src="/preload.js"></script>
</body>
</html>
