<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bluebird Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <nav id="main-nav">
        <img src="images/Copilot_20251122_223052.png" alt="Bluebird Browser Logo">
        <span class="title-text">Profile Manager</span>
    </nav>
    <main id="makeSurePage" style="display: grid; grid-template-areas: 'info' 'actions'; grid-template-rows: 100% 10%;">
        <div class="centered-t">
            <input type="search" id="searchProfiles" class="wide-btn" style="margin-top: 10px;" placeholder="Search Profiles">
            <p style="width: 400px; text-align: left; padding: 0 20px; margin-top: 20px;">Select a Profile to Use</p>
            <div style="display: flex; justify-content: center;">
                <div id="profiles" class="centered-t" style="text-align: center; align-items: center;"></div>
            </div>
            <br>
            <div style="position: sticky; bottom: 0; left: 0; padding: 10px; padding-bottom: 20px; background: rgb(22, 22, 22);">
                <button onclick="window.electronAPI.openAppPage('pages/profilePages/addProfile.html', 550, 750, undefined)" class="wide-btn active">Add Profile</button><br>
                <button style="margin-top: 10px;" class="wide-btn" onclick="window.electronAPI.quitApp()">Quit App</button>
            </div>
            <br>
            <footer><h6>Bluebird Browser for MacOS ver.</h6></footer>
        </div>
    </main>
	<script src="script.js"></script>
	<script src="renderer.js" type="module"></script>
    <script src="/preload.js"></script>
</body>
</html>
