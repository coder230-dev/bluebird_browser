<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager - Bluebird Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <div id="notification"></div>
    <nav>
        <div style="display: flex; gap: 10px;" id="dropDown" onclick="openModeChangePop()"">
            <span id="t-l-title">
                <h3>Bluebird Manager</h3>
            </span>
            <i class="material-symbols-rounded">arrow_drop_down</i>
        </div>
        <div id="search-cont" class="search-cont">
            <i class="material-symbols-rounded">search</i>
            <input type="search" placeholder="Search" id="searchBar">
            <select id="sort-nav">
                <option value="latest">Latest</option>
                <option value="oldest">Oldest</option>
                <option value="A-Z">A-Z</option>
                <option value="Z-A">Z-A</option>
            </select>
        </div>
        <button>
            <a href="downloadData.html" title="Download your Data">
                <i class="material-symbols-rounded">download</i>
            </a>
        </button>
        <span id="clear-cont"></span>
    </nav>
    <div id="searchable-content">
        <div class="loader">
            <svg class="load" viewBox="25 25 50 50" class="spinner">
                <circle r="20" cy="50" cx="50"></circle>
            </svg>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
