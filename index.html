<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Bluebird Browser</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.css"
		integrity="sha512-NhLySQDkiKSKnT+R795uaHWRQ7D3VuIvgeOLCK8cWq4w5fq4sWF90gj8eURpTqn/f1mFzqClpOz8JPlgVTLfFw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.css"
		integrity="sha512-Ve5cyESWChtU1zL3EIMU0T1LddBbffKw+bZsuO6YpN65a0EvnQnyiXnU72Xt9CgWyW7hMafF3hSWcUf55rGa/Q=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<button id="new-window" style="position: fixed; z-index: -1; opacity: 0;">🗗</button>

<body>
	<div id="notification"></div>
	<header class="titlebar" id="titlebar">
		<div id="top-part">
			<div id="tabs" class="tabs">
				<button title="New Tab" id="new-tab" class="new-tab">+</button>
			</div>
			<button id="update-btn" class="hidden" title="App update available">
				<i class="material-symbols-rounded">system_update</i>
				<span class="update-badge"></span>
			</button>
			<button id="top-right-btn"><i class="material-symbols-rounded">tabs</i> Tabs</button>
		</div>
		<div class="toolbar">
			<button title="Back" id="back">
				<i class="material-symbols-rounded">arrow_back</i>
			</button>
			<button title="Forward" id="forward">
				<i class="material-symbols-rounded">arrow_forward</i>
			</button>
			<button title="Reload" id="reload">
				<i class="material-symbols-rounded">refresh</i>
			</button>
			<div class="search-container" id="search-container">
				<button id="viewWebsiteInfo" title="View Website Information">
					<i class="material-symbols-rounded">web</i></button>
				<input id="address" type="text" placeholder="Search or enter URL address">
				<span class="sep"></span>
				<button id="searchModeOpt" style="display: flex !important; align-items: center;" title="Search Mode"><i
						class="material-symbols-rounded">search_gear</i> Set Search Mode</button>
				<button id="zoomBtn" title="Zoom..."><i class="material-symbols-rounded">search</i></button>
				<button id="address-more">
					<i class="material-symbols-rounded">keyboard_arrow_down</i>
				</button>
				<div id="suggestions" class="suggestions"></div>
				<div id="right-info"></div>
			</div>
			<button id="bookmark-manager" class="hbD">
				<i title="Bookmark Manager" class="material-symbols-rounded">bookmark</i>
			</button>
			<button id="btnHistory" class="hbD">
				<i title="History Manager" class="material-symbols-rounded">history</i>
			</button>
			<button id="btnDownloads" class="hbD">
				<i title="Downloads Manager" class="material-symbols-rounded">download</i>
			</button>
			<button id="btnFind" class="hbD">
				<i title="Find" class="material-symbols-rounded">find_in_page</i>
			</button>
			<button id="btnPrint" class="hbD">
				<i title="Print" class="material-symbols-rounded">print</i>
			</button>
			<button id="btnShare" class="hbD">
				<i title="Share" class="material-symbols-rounded">share</i>
			</button>
			<button id="btnPrivacy" class="hbD">
				<i title="Privacy" class="material-symbols-rounded">privacy_tip</i>
			</button>
			<button id="btnDevTools" class="hbD">
				<i title="Developer Tools" class="material-symbols-rounded">code</i>
			</button>
			<button id="btnSettings" class="hbD">
				<i title="Settings" class="material-symbols-rounded">settings</i>
			</button>
			<button id="profile-info"></button>
			<button id="aiBtn" class="hbD">
				<i title="Use AI" class="material-symbols-rounded">robot_2</i>
			</button>
			<button id="btnBattery" class="hbD">
				<i title="Settings" class="material-symbols-rounded">battery_android_frame_6</i>
			</button>
			<button id="more-btn" style="z-index: 1000;"><i class="material-symbols-rounded">more_vert</i></button>
		</div>
	</header>
	<div id="main-for-view">
		<main id="views"></main>
	</div>
	<div id="settings-modal" class="modal hidden"></div>
	<!-- <script defer src="profileFunction.js"></script> -->
	<script src="renderer.js" type="module" defer></script>
	<script src="https://html2canvas.hertzen.com/dist/html2canvas.js"></script>
</body>

</html>
